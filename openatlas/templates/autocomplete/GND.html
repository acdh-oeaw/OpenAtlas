  <script>
  /**
   * GND autocomplete
   * Documentation: https://bootstrap-autocomplete.readthedocs.io/en/latest/
   * Bootstrap version needs to be manually set d/t
  */
  $('input[data-reference-system={{ system_id }}]').autoComplete({
    bootstrapVersion: '4',
    resolver: 'custom',
    formatResult: function (item) {
      return {
         value: item.id,
         text: `${item.label} - ${item.category}<br><small>${item.id.substring(item.id.lastIndexOf('/') + 1)}</small>`
      };
    },
    events: {
      search: function (qry, callback) {
        $.ajax({
          url: "https://lobid.org/gnd/search",
          dataType: "jsonp",
          data: {
            q: qry,
            format: "json:preferredName"
          },
          success: function(data) {
            callback(data);
          }
        })
      }
    }
  }).on('autocomplete.select', function(evt,item) {
    $('input[data-reference-system={{ system_id }}]').val(item.id.substring(item.id.lastIndexOf('/') + 1));
  });
</script>
